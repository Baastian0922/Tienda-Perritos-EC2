services:
  db:
    build: ./db
    container_name: tienda-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
      MYSQL_USER: alumno
      MYSQL_PASSWORD: alumno123
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_net

  backend:
    build: ./backend
    container_name: tienda-backend
    restart: always
    environment:
      DB_HOST: db
      DB_USER: alumno
      DB_PASSWORD: alumno123
      DB_NAME: tienda_perritos
    depends_on:
      - db
    networks:
      - backend_net
      - frontend_net

  frontend:
    build: ./frontend
    container_name: tienda-frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - frontend_net

volumes:
  db_data:

networks:
  frontend_net:
  backend_net: